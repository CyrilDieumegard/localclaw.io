    <style>
        .lc-icon{display:inline-block;width:1em;height:1em;vertical-align:-0.125em;flex-shrink:0;}.lc-icon-sm{width:0.875em;height:0.875em;}.lc-icon-lg{width:1.25em;height:1.25em;}.lc-icon-2x{width:2em;height:2em;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#050505;--surface:#0F0F11;--surface2:#18181B;--border:#27272A;--border2:#3F3F46;--primary:#FF453A;--accent:#FF6D64;--text:#FFF;--muted:#A1A1AA;--green:#34D399;--blue:#60A5FA;--purple:#A855F7;--yellow:#FACC15;--cyan:#22D3EE;}
        body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
        .fd{font-family:'Space Grotesk','Inter',sans-serif;}
        .fm{font-family:'JetBrains Mono','Fira Code',monospace;}
        a{text-decoration:none;color:inherit;}
        ::selection{background:rgba(255,69,58,.3);color:#fff;}
        ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--primary);}
        *{scrollbar-width:thin;scrollbar-color:var(--border) var(--bg);}

        /* Nav */
        .nav{position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(39,39,42,.5);background:rgba(5,5,5,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
        .nav-in{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;}
        .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
        .nav-logo-i{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#FF453A,#ea580c);display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px rgba(255,69,58,.4);}
        .nav-logo-i svg{width:20px;height:20px;}
        .nav-links{display:flex;gap:20px;align-items:center;}
        .nav-links a{font-size:13px;font-weight:500;color:var(--muted);transition:color .2s;}
        .nav-links a:hover{color:#fff;}
        .nav-badge{padding:2px 8px;border-radius:999px;background:rgba(255,69,58,0.12);border:1px solid rgba(255,69,58,0.3);color:var(--primary);font-size:10px;font-weight:700;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px;}
        .nav-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 1.5s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

        /* Loading */
        .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
        .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}

        /* Hero */
        .hero{max-width:1200px;margin:0 auto;padding:32px 20px 0;}
        .breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:24px;flex-wrap:wrap;}
        .breadcrumb a{color:var(--muted);transition:color .2s;}
        .breadcrumb a:hover{color:var(--primary);}

        /* Back to List Link */
        .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--muted);padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);transition:all .2s;margin-bottom:16px;cursor:pointer;text-decoration:none;}
        .back-link:hover{background:rgba(255,69,58,.08);border-color:rgba(255,69,58,.2);color:var(--primary);transform:translateX(-2px);}
        .back-link svg{width:16px;height:16px;}
        .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:20px;}
        .hero-info{flex:1;min-width:0;}
        .hero-fam{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
        .hero-fam-dot{width:10px;height:10px;border-radius:50%;}
        .hero-fam-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
        .hero-name{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.15;margin-bottom:10px;}
        .hero-desc{font-size:15px;color:var(--muted);line-height:1.65;max-width:700px;}
        .hero-actions{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;align-items:flex-start;}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none;}
        .btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 15px rgba(255,69,58,.3);}
        .btn-primary:hover{background:#e03e33;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,69,58,.4);}
        .btn-secondary{background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(255,255,255,.1);}
        .btn-secondary:hover{border-color:rgba(255,69,58,.3);background:rgba(255,69,58,.05);}

        /* Tags */
        .tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px;}
        .tag-pill{padding:4px 12px;border-radius:8px;background:rgba(255,255,255,.04);font-size:11px;color:var(--muted);border:1px solid transparent;}
        .tag-pill.special{background:rgba(255,69,58,.06);color:var(--accent);border-color:rgba(255,69,58,.15);}
        .tag-pill.green{background:rgba(52,211,153,.06);color:var(--green);border-color:rgba(52,211,153,.15);}

        /* Live Stats Banner */
        .live-stats{max-width:1200px;margin:0 auto 24px;padding:0 20px;}
        .live-stats-inner{display:flex;gap:12px;flex-wrap:wrap;}
        .live-stat{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(39,39,42,.3);font-size:13px;color:var(--muted);transition:all .3s;}
        .live-stat.loaded{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.03);}
        .live-stat-icon{font-size:16px;}
        .live-stat-val{font-weight:700;color:#fff;}
        .live-stat .loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--border);animation:pulse 1.5s ease-in-out infinite;}
        @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

        /* Main Grid */
        .main-grid{max-width:1200px;margin:0 auto;padding:0 20px 40px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        @media(max-width:860px){.main-grid{grid-template-columns:1fr;}}

        /* Cards */
        .card{background:rgba(15,15,17,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;transition:border-color .3s;}
        .card:hover{border-color:rgba(255,69,58,.15);}
        .card-full{grid-column:1/-1;}
        .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

        /* Radar Chart */
        .radar-wrap{position:relative;width:100%;max-width:340px;margin:0 auto;}
        .radar-score{text-align:center;margin-top:12px;padding:14px;border-radius:12px;background:rgba(255,69,58,.04);border:1px solid rgba(255,69,58,.12);}
        .radar-score-num{font-size:2.2rem;font-weight:700;color:var(--primary);}
        .radar-score-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

        /* Benchmark Bars */
        .bench-bars{display:flex;flex-direction:column;gap:14px;margin-top:20px;}
        .bench-row{display:flex;align-items:center;gap:12px;}
        .bench-label{width:80px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;}
        .bench-track{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
        .bench-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.25,.8,.25,1);width:0;}
        .bench-val{width:40px;font-size:14px;font-weight:700;text-align:center;}

        /* Spec Grid */
        .spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        @media(max-width:480px){.spec-grid{grid-template-columns:1fr;}}
        .spec-item{padding:12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(39,39,42,.2);}
        .spec-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
        .spec-val{font-size:14px;font-weight:600;color:#fff;}
        .spec-val a{color:var(--primary);transition:color .2s;}
        .spec-val a:hover{color:var(--accent);}

        /* List Card */
        .list-items{list-style:none;padding:0;display:flex;flex-direction:column;gap:2px;}
        .list-items li{padding:10px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.85);line-height:1.55;display:flex;align-items:flex-start;gap:10px;transition:background .2s;}
        .list-items li:hover{background:rgba(255,255,255,.02);}
        .list-icon{flex-shrink:0;font-size:14px;margin-top:1px;}

        /* Quant Card */
        .quant-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(39,39,42,.15);}
        .quant-row:last-of-type{border-bottom:none;}
        .quant-name{width:70px;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0;}
        .quant-track{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;}
        .quant-fill{height:100%;border-radius:4px;transition:width .8s ease;}
        .quant-size{width:65px;font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;}
        .quant-rec{padding:2px 7px;border-radius:4px;background:rgba(255,69,58,.12);color:var(--primary);font-size:9px;font-weight:700;margin-left:4px;flex-shrink:0;}
        .quant-qual{width:55px;font-size:10px;color:var(--muted);text-align:center;flex-shrink:0;}

        /* Link Rows */
        .link-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;transition:background .2s;font-size:13px;color:rgba(255,255,255,.8);text-decoration:none;}
        .link-row:hover{background:rgba(255,69,58,.05);}
        .link-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
        .link-arrow{margin-left:auto;font-size:12px;color:var(--muted);}

        /* Similar Models */
        .similar-grid{display:flex;flex-wrap:wrap;gap:8px;}
        .similar-chip{padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(39,39,42,.3);font-size:12px;color:var(--muted);transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;}
        .similar-chip:hover{border-color:rgba(255,69,58,.4);color:var(--primary);background:rgba(255,69,58,.05);}

        /* Nav Arrows */
        .model-nav{max-width:1200px;margin:0 auto;padding:20px 20px 10px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
        .model-nav a{padding:8px 18px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(39,39,42,.3);font-size:12px;color:var(--muted);transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
        .model-nav a:hover{border-color:rgba(255,69,58,.3);color:#fff;background:rgba(255,69,58,.05);}

        /* 404 */
        .not-found{text-align:center;padding:80px 20px;}
        .not-found h2{font-size:2rem;margin:16px 0 8px;}
        .not-found p{color:var(--muted);font-size:14px;}

        /* Footer */
        .footer{border-top:1px solid rgba(39,39,42,.15);padding:24px 20px;text-align:center;margin-top:20px;}
        .footer a{color:var(--primary);}

        /* Particles */
        #particles-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;}

        /* Fun fact */
        .fun-fact{background:linear-gradient(135deg,rgba(255,69,58,.03),rgba(249,115,22,.03));border-color:rgba(255,69,58,.12) !important;}

        /* Animations */
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        .fade-up{animation:fadeUp .5s ease forwards;opacity:0;}
        .fade-up-d1{animation-delay:.1s;}
        .fade-up-d2{animation-delay:.2s;}
        .fade-up-d3{animation-delay:.3s;}
        .fade-up-d4{animation-delay:.4s;}

        /* Amazon Affiliate */
        .amz-section{margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,153,0,.12);}
        .amz-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,153,0,.8);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
        .amz-card{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:rgba(255,153,0,.03);border:1px solid rgba(255,153,0,.08);margin-bottom:8px;transition:all .2s;text-decoration:none;color:inherit;}
        .amz-card:hover{border-color:rgba(255,153,0,.25);background:rgba(255,153,0,.06);transform:translateX(2px);}
        .amz-badge{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.03em;flex-shrink:0;}
        .amz-badge.best{background:rgba(255,153,0,.15);color:#FF9900;}
        .amz-badge.budget{background:rgba(52,211,153,.12);color:#34D399;}
        .amz-badge.gpu{background:rgba(239,68,68,.12);color:#F87171;}
        .amz-badge.pc{background:rgba(96,165,250,.12);color:#60A5FA;}
        .amz-info{flex:1;min-width:0;}
        .amz-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.9);}
        .amz-price{font-size:11px;color:var(--muted);margin-top:1px;}
        .amz-btn{padding:5px 12px;border-radius:7px;background:#FF9900;color:#111;font-size:10px;font-weight:700;flex-shrink:0;transition:all .2s;white-space:nowrap;}
        .amz-card:hover .amz-btn{background:#FFB84D;}
        .amz-btn.apple-btn{background:#0071E3;color:#fff;}
        .amz-card:hover .amz-btn.apple-btn{background:#0077ED;}
        .amz-disclaimer{font-size:9px;color:rgba(161,161,170,.6);margin-top:8px;line-height:1.4;}

        /* Light Mode Styles */
        html.light body {
            --bg: #faf9f6 !important;
            --surface: #ffffff !important;
            --surface2: #f1f5f9 !important;
            --border: #e2e8f0 !important;
            --border2: #cbd5e1 !important;
            --primary: #FF453A !important;
            --accent: #e03e33 !important;
            --text: #0f172a !important;
            --muted: #475569 !important;
            --green: #16a34a !important;
            --blue: #2563eb !important;
            --purple: #7c3aed !important;
            --yellow: #d97706 !important;
            --cyan: #0891b2 !important;
            background: #faf9f6 !important;
            color: #0f172a !important;
        }

        /* Nav */
        html.light .nav {
            border-bottom-color: rgba(0,0,0,0.1);
            background: rgba(250,249,246,0.92);
        }
        html.light .nav-links a { color: #64748b; }
        html.light .nav-links a:hover { color: #0f172a; }

        /* Cards */
        html.light .card {
            background: rgba(255,255,255,0.9) !important;
            border-color: rgba(0,0,0,0.08) !important;
        }
        html.light .card:hover { border-color: rgba(255,69,58,0.3) !important; }

        /* Spec items */
        html.light .spec-item {
            background: rgba(0,0,0,0.02) !important;
            border-color: rgba(0,0,0,0.08) !important;
        }
        html.light .spec-val { color: #0f172a !important; }
        html.light .spec-label { color: #475569 !important; }

        /* Live stats */
        html.light .live-stat {
            background: rgba(255,255,255,0.7) !important;
            border-color: rgba(0,0,0,0.08) !important;
        }
        html.light .live-stat-val { color: #0f172a !important; }

        /* Benchmark bars */
        html.light .bench-track { background: rgba(0,0,0,0.07) !important; }
        html.light .bench-val { color: #0f172a !important; }
        html.light .bench-label { color: #475569 !important; }

        /* Quant rows */
        html.light .quant-track { background: rgba(0,0,0,0.07) !important; }
        html.light .quant-row { border-bottom-color: rgba(0,0,0,0.07) !important; }
        html.light .quant-name { color: #334155 !important; }
        html.light .quant-size { color: #475569 !important; }
        html.light .quant-qual { color: #475569 !important; }

        /* List items */
        html.light .list-items li {
            color: #1e293b !important;
        }
        html.light .list-items li:hover { background: rgba(0,0,0,0.03) !important; }

        /* Link rows */
        html.light .link-row {
            color: #1e293b !important;
        }
        html.light .link-row:hover { background: rgba(255,69,58,0.04) !important; }
        html.light .link-arrow { color: #94a3b8 !important; }

        /* Similar chips */
        html.light .similar-chip {
            background: rgba(0,0,0,0.03) !important;
            border-color: rgba(0,0,0,0.1) !important;
            color: #475569 !important;
        }

        /* Model nav arrows */
        html.light .model-nav a {
            background: rgba(0,0,0,0.03) !important;
            border-color: rgba(0,0,0,0.1) !important;
            color: #475569 !important;
        }
        html.light .model-nav a:hover { color: #0f172a !important; }

        /* Back link */
        html.light .back-link {
            background: rgba(0,0,0,0.03) !important;
            border-color: rgba(0,0,0,0.08) !important;
            color: #475569 !important;
        }

        /* Tag pills */
        html.light .tag-pill { color: #475569 !important; background: rgba(0,0,0,0.04) !important; }

        /* Btn secondary */
        html.light .btn-secondary {
            background: rgba(0,0,0,0.04) !important;
            color: #1e293b !important;
            border-color: rgba(0,0,0,0.12) !important;
        }

        /* Radar score box */
        html.light .radar-score {
            background: rgba(255,69,58,0.04) !important;
            border-color: rgba(255,69,58,0.15) !important;
        }

        /* Radar canvas — force white background so grid lines are visible */
        html.light #radar-chart {
            background: #ffffff !important;
            border-radius: 8px;
        }

        /* Hardware requirements inline grid tiles */
        html.light [style*="background:rgba(255,255,255,.02)"],
        html.light [style*="background: rgba(255,255,255,.02)"] {
            background: rgba(0,0,0,0.03) !important;
        }

    // === Radar Chart ===

            var dlEl=document.getElementById('hf-downloads');if(dlEl) dlEl.textContent=fmtN(data.downloads||data.downloadsAllTime||0);var dlStat=document.getElementById('stat-downloads');if(dlStat) dlStat.classList.add('loaded');
            var likeEl=document.getElementById('hf-likes');if(likeEl) likeEl.textContent=fmtN(data.likes||0);var likeStat=document.getElementById('stat-likes');if(likeStat) likeStat.classList.add('loaded');
            var updEl=document.getElementById('hf-updated');if(updEl&&data.lastModified){var d=new Date(data.lastModified);updEl.textContent=d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}else if(updEl){updEl.textContent='—';}var updStat=document.getElementById('stat-updated');if(updStat) updStat.classList.add('loaded');

        }).catch(function(){setHfError();});
    }

    // === Particles ===
    function initParticles(){
        var c=document.getElementById('particles-canvas');if(!c)return;
        var ctx=c.getContext('2d'),ps=[],N=window.innerWidth<640?12:30,MD=120;
        function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
        resize();window.addEventListener('resize',resize);
        for(var i=0;i<N;i++) ps.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,red:Math.random()>.7});
        (function anim(){
            ctx.clearRect(0,0,c.width,c.height);
            for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.red?'rgba(255,69,58,.5)':'rgba(255,255,255,.3)';ctx.fill();}
            for(var i=0;i<ps.length;i++)for(var j=i+1;j<ps.length;j++){var dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<MD){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle='rgba(255,69,58,'+(0.08*(1-d/MD))+')';ctx.lineWidth=.5;ctx.stroke();}}
            requestAnimationFrame(anim);
        })();
    }

    <script>
        (function() {
            const scrollBtn = document.getElementById('scroll-to-top');
            const scrollThreshold = 300;
            
            function toggleScrollButton() {
                if (window.pageYOffset > scrollThreshold) {
                    scrollBtn.classList.add('visible');
                } else {
                    scrollBtn.classList.remove('visible');
                }
            }
            
            function scrollToTop(e) {
                e.preventDefault();
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            }
            
            window.addEventListener('scroll', toggleScrollButton, { passive: true });
            scrollBtn.addEventListener('click', scrollToTop);
            toggleScrollButton();
        })();
    </script>
