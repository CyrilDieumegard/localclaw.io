<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon Link Checker v2</title>
<style>
body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #eee; padding: 20px; max-width: 1200px; margin: 0 auto; }
h1 { color: #ff4444; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; margin: 10px 0; }
.card a { color: #4af; font-size: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
.status { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; display: inline-block; margin-top: 8px; }
.s-ok { background: #0a3a0a; color: #0f0; border: 1px solid #0f04; }
.s-fail { background: #3a0a0a; color: #f44; border: 1px solid #f444; }
.s-warn { background: #3a2a0a; color: #fa0; border: 1px solid #fa04; }
.s-pending { background: #1a1a2a; color: #88f; border: 1px solid #88f4; }
.tag { font-size: 11px; color: #888; }
.price { color: #fa0; font-weight: bold; }
iframe { display: none; }
#log { background: #111; border: 1px solid #333; border-radius: 4px; padding: 10px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 12px; color: #888; }
</style>
</head>
<body>
<h1>🔍 Amazon ASIN Checker — LocalClaw</h1>
<p>Testing all 11 Amazon affiliate links used in the project.<br>
<span style="color:#888">Method: fetch() with no-cors mode to detect redirects vs errors.</span></p>

<div id="grid" class="grid"></div>
<div id="summary" style="margin-top: 20px; padding: 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;"></div>
<div id="log"></div>

<script>
const products = [
    { asin: 'B0DLBTPDCS', name: 'Apple Mac Mini M4 16GB', price: '$499', usedIn: 'app.js, llm-detail, blog' },
    { asin: 'B0DNRFSYLF', name: 'Mac Mini M4 Pro 24GB', price: '$1,399', usedIn: 'app.js, llm-detail, blog x3' },
    { asin: 'B0DS2XP86K', name: 'Mac Mini M4 Pro 48GB', price: '$1,799', usedIn: 'llm-detail.html' },
    { asin: null, name: 'Mac Studio M4 Max 64GB', price: '$3,199', usedIn: 'llm-detail.html', appleUrl: 'https://www.apple.com/mac-studio/' },
    { asin: null, name: 'Mac Studio M4 Ultra 128GB', price: '$5,999', usedIn: 'llm-detail.html', appleUrl: 'https://www.apple.com/mac-studio/' },
    { asin: 'B0CBK7H19M', name: 'RTX 4060 Ti 16GB (MSI)', price: '$399', usedIn: 'app.js, llm-detail, blog' },
    { asin: 'B0BSVMLVTD', name: 'RTX 4090 24GB', price: '$1,599', usedIn: 'llm-detail.html' },
    { asin: 'B08XBVXNFP', name: 'Beelink Mini PC 16GB', price: '$199', usedIn: 'app.js' },
];

const grid = document.getElementById('grid');
const logEl = document.getElementById('log');
let results = {};

function log(msg) {
    const p = document.createElement('div');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(p);
    logEl.scrollTop = logEl.scrollHeight;
    console.log(msg);
}

function renderCards() {
    grid.innerHTML = products.map((p, i) => {
        const r = results[p.asin] || { status: 'pending', msg: 'Waiting...' };
        const sClass = r.status === 'ok' ? 's-ok' : r.status === 'fail' ? 's-fail' : r.status === 'warn' ? 's-warn' : 's-pending';
        return `<div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <strong>${p.name}</strong>
                <span class="price">${p.price}</span>
            </div>
            <div class="tag">ASIN: ${p.asin} — Used in: ${p.usedIn}</div>
            <div class="status ${sClass}">${r.msg}</div>
            <div style="margin-top:8px">
                <a href="https://www.amazon.com/dp/${p.asin}?tag=localclaw-20" target="_blank">🔗 Open on Amazon</a>
            </div>
        </div>`;
    }).join('');
}

async function checkProduct(product) {
    const url = `https://www.amazon.com/dp/${product.asin}`;
    log(`Checking ${product.asin} (${product.name})...`);
    
    try {
        // Method: no-cors fetch — we can only detect network errors vs opaque responses
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 10000);
        
        const resp = await fetch(url, { 
            mode: 'no-cors', 
            signal: controller.signal,
            redirect: 'follow'
        });
        clearTimeout(timeout);
        
        // no-cors always returns opaque response (type: 'opaque', status: 0)
        // If we get here, the server responded (even if we can't read it)
        log(`${product.asin}: Got response (type=${resp.type}, status=${resp.status})`);
        
        results[product.asin] = { 
            status: 'warn', 
            msg: `⚠️ Server responded — verify manually (CORS blocks reading)` 
        };
        
    } catch (e) {
        log(`${product.asin}: Error — ${e.message}`);
        if (e.name === 'AbortError') {
            results[product.asin] = { status: 'warn', msg: '⚠️ Timeout — server slow or blocking' };
        } else {
            results[product.asin] = { status: 'fail', msg: `❌ Network error: ${e.message}` };
        }
    }
    
    renderCards();
}

async function runChecks() {
    renderCards();
    
    for (const product of products) {
        await checkProduct(product);
        await new Promise(r => setTimeout(r, 300));
    }
    
    const ok = Object.values(results).filter(r => r.status === 'ok').length;
    const warn = Object.values(results).filter(r => r.status === 'warn').length;
    const fail = Object.values(results).filter(r => r.status === 'fail').length;
    
    document.getElementById('summary').innerHTML = `
        <h3>📊 Results: ${products.length} links checked</h3>
        <p>✅ Confirmed: ${ok} | ⚠️ Need manual check: ${warn} | ❌ Failed: ${fail}</p>
        <p style="color:#fa0;margin-top:10px">⚠️ Amazon actively blocks automated checking. The first server-side test showed:<br>
        - <span style="color:#0f0">✅ 2 confirmed OK</span>: B0CBK7H19M (RTX 4060 Ti), B0BSVMLVTD (RTX 4090)<br>
        - <span style="color:#f44">❌ 2 returned HTTP 404</span>: B0DK48JN23 (Mac Mini M4 Pro 24GB), B0DK4J4QBL (Mac Studio M4 Ultra 128GB)<br>
        - <span style="color:#888">⏳ 6 returned HTTP 500</span> (anti-bot block — inconclusive)</p>
    `;
    
    log('All checks complete.');
}

runChecks();
</script>
<script src="https://www.genspark.ai/sandbox_inspect.js"></script></body>
</html>
