<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalClaw — Data Governance Check</title>
  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0b0b0f;color:#f3f4f6;margin:0;padding:24px}
    .wrap{max-width:1100px;margin:0 auto}
    .card{background:#12121a;border:1px solid #27272a;border-radius:14px;padding:16px;margin-bottom:16px}
    h1{margin:0 0 8px;font-size:24px}
    h2{margin:0 0 10px;font-size:18px}
    .muted{color:#a1a1aa}
    .ok{color:#22c55e}
    .warn{color:#f59e0b}
    .err{color:#ef4444}
    ul{margin:8px 0 0 18px}
    code{background:#18181b;border:1px solid #27272a;border-radius:6px;padding:1px 6px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media (max-width: 900px){.row{grid-template-columns:1fr}}
    button{background:#ff453a;color:#fff;border:0;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer}
  </style>
</head>
<body>
<div class="wrap">
  <h1>LocalClaw Data Governance</h1>
  <p class="muted">Audit non destructif — aucune page de prod n’est modifiée par ce check.</p>

  <div class="card">
    <button id="run">Lancer l’audit</button>
    <p class="muted" style="margin-top:10px">Sources auditées: <code>js/data.js</code> (LLM), <code>tts-list.html</code> (TTS inline).</p>
  </div>

  <div class="row">
    <div class="card" id="llm-box"><h2>LLM</h2><p class="muted">En attente…</p></div>
    <div class="card" id="tts-box"><h2>TTS</h2><p class="muted">En attente…</p></div>
  </div>

  <div class="card" id="global-box"><h2>Global</h2><p class="muted">En attente…</p></div>
</div>

<script src="../js/data-governance.js"></script>
<script src="../js/data.js"></script>
<script>
  function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}

  async function loadTTSModelsFromHtml() {
    const res = await fetch('../tts-list.html');
    const html = await res.text();
    const m = html.match(/const\s+TTS_MODELS\s*=\s*\[(.*?)\];\s*\/\/ State/s);
    if (!m) throw new Error('TTS_MODELS introuvable dans tts-list.html');
    const arrBody = m[1];
    // trusted local source, used only in audit page
    const arr = Function('"use strict"; return [' + arrBody + '];')();
    return arr;
  }

  function renderReport(el, report){
    const sum = window.LocalClawDataGovernance.summarize(report);
    el.innerHTML = `
      <h2>${esc(sum.domain)}</h2>
      <p>Total: <strong>${sum.total}</strong></p>
      <p class="${sum.ok ? 'ok':'err'}">${sum.ok ? '✅ Aucun blocage' : '❌ Erreurs détectées: ' + sum.errorCount}</p>
      <p class="${sum.warningCount ? 'warn' : 'muted'}">⚠️ Warnings: ${sum.warningCount}</p>
      ${report.errors.length ? `<h3 class="err">Erreurs</h3><ul>${report.errors.slice(0, 40).map(e=>`<li>${esc(e)}</li>`).join('')}</ul>` : ''}
      ${report.warnings.length ? `<h3 class="warn">Warnings</h3><ul>${report.warnings.slice(0, 40).map(w=>`<li>${esc(w)}</li>`).join('')}</ul>` : ''}
    `;
  }

  async function runAudit(){
    const llmBox = document.getElementById('llm-box');
    const ttsBox = document.getElementById('tts-box');
    const globalBox = document.getElementById('global-box');

    llmBox.innerHTML = '<h2>LLM</h2><p class="muted">Audit en cours…</p>';
    ttsBox.innerHTML = '<h2>TTS</h2><p class="muted">Audit en cours…</p>';
    globalBox.innerHTML = '<h2>Global</h2><p class="muted">Audit en cours…</p>';

    try {
      const llmModels = (window.APP_DATA && Array.isArray(window.APP_DATA.models)) ? window.APP_DATA.models : [];
      const ttsModels = await loadTTSModelsFromHtml();

      const llmReport = window.LocalClawDataGovernance.validateLLM(llmModels);
      const ttsReport = window.LocalClawDataGovernance.validateTTS(ttsModels);

      renderReport(llmBox, llmReport);
      renderReport(ttsBox, ttsReport);

      const totalErrors = llmReport.errors.length + ttsReport.errors.length;
      const totalWarnings = llmReport.warnings.length + ttsReport.warnings.length;

      globalBox.innerHTML = `
        <h2>Global</h2>
        <p>LLM: <strong>${llmReport.total}</strong> modèles · TTS: <strong>${ttsReport.total}</strong> modèles</p>
        <p class="${totalErrors ? 'err' : 'ok'}">${totalErrors ? '❌ Erreurs bloquantes: ' + totalErrors : '✅ Aucune erreur bloquante'}</p>
        <p class="${totalWarnings ? 'warn' : 'muted'}">⚠️ Warnings: ${totalWarnings}</p>
        <p class="muted">Conseil: corriger d’abord les erreurs, puis les warnings à fort impact SEO/confiance.</p>
      `;
    } catch (e) {
      globalBox.innerHTML = `<h2>Global</h2><p class="err">Erreur audit: ${esc(e.message)}</p>`;
    }
  }

  document.getElementById('run').addEventListener('click', runAudit);
</script>
<script src="https://www.genspark.ai/sandbox_inspect.js"></script></body>
</html>
